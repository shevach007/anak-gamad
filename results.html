<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תוצאות ענק וגמד</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      color: #fff;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
    }

    .subtitle {
      text-align: center;
      color: #a0c4ff;
      margin-bottom: 36px;
      font-size: 1rem;
    }

    .table-wrap {
      max-width: 900px;
      margin: 0 auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
    }

    thead {
      background: rgba(100, 200, 255, 0.15);
    }

    th {
      padding: 14px 16px;
      font-size: 0.95rem;
      color: #a0c4ff;
      font-weight: 600;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    td {
      padding: 13px 16px;
      font-size: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(255,255,255,0.04); }

    .correct {
      color: #90e0a0;
      font-weight: bold;
      font-size: 1.3rem;
    }

    .wrong {
      color: #ff8fa3;
      font-weight: bold;
      font-size: 1.3rem;
    }

    .unknown {
      color: #aaa;
      font-size: 0.85rem;
    }

    .name-cell { font-weight: bold; font-size: 1.05rem; }

    .stats {
      max-width: 900px;
      margin: 24px auto 0;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px 28px;
      text-align: center;
    }

    .stat-box .num {
      font-size: 2rem;
      font-weight: bold;
    }

    .stat-box .label { font-size: 0.85rem; color: #a0c4ff; margin-top: 4px; }

    .green { color: #90e0a0; }
    .red   { color: #ff8fa3; }
    .blue  { color: #64c8ff; }

    .loading {
      text-align: center;
      padding: 60px;
      color: #a0c4ff;
      font-size: 1.1rem;
    }

    .error {
      text-align: center;
      padding: 60px;
      color: #ff8fa3;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="icon" style="text-align:center;font-size:3rem;margin-bottom:10px">🎉</div>
  <h1>תוצאות ענק וגמד</h1>
  <p class="subtitle">האם ניחשתם נכון מי היה הגמד שלכם?</p>

  <div id="content" class="loading">טוען נתונים...</div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjiZOrWCuchqLkpq5qyJfagwRBQhN2znzdRHTjwNfscrQATJLUgPeThEGQXMNxiMhR/exec";

  async function load() {
      const el = document.getElementById("content");
      try {
        const res = await fetch(SCRIPT_URL + "?action=data");
        if (!res.ok) throw new Error("server error");
        const entries = await res.json();

        if (entries.length === 0) {
          el.innerHTML = '<div class="error">אין נתונים עדיין.</div>';
          return;
        }

        // Build actual gamad map:
        // If person A's anak = B, then B's actual gamad = A
        const actualGamad = {};
        entries.forEach(e => {
          if (e.anak) actualGamad[e.anak] = e.name;
        });

        let correct = 0, wrong = 0, unknown = 0;

        const rows = entries.map(e => {
          const actual = actualGamad[e.name];
          let icon, result;
          if (!actual) {
            icon = '<span class="unknown">?</span>';
            result = '<span class="unknown">לא ידוע</span>';
            unknown++;
          } else if (e.gamad === actual) {
            icon = '<span class="correct">✅</span>';
            result = `<span class="correct">${actual}</span>`;
            correct++;
          } else {
            icon = '<span class="wrong">❌</span>';
            result = `<span class="wrong">${actual}</span>`;
            wrong++;
          }

          return `
            <tr>
              <td class="name-cell">${e.name}</td>
              <td>${e.anak || '<span class="unknown">—</span>'}</td>
              <td>${e.gamad || '<span class="unknown">—</span>'}</td>
              <td>${result}</td>
              <td style="text-align:center">${icon}</td>
            </tr>`;
        }).join("");

        el.innerHTML = `
          <div class="stats">
            <div class="stat-box"><div class="num blue">${entries.length}</div><div class="label">השתתפו</div></div>
            <div class="stat-box"><div class="num green">${correct}</div><div class="label">ניחשו נכון</div></div>
            <div class="stat-box"><div class="num red">${wrong}</div><div class="label">טעו</div></div>
          </div>
          <div class="table-wrap" style="margin-top:24px">
            <table>
              <thead>
                <tr>
                  <th>שם</th>
                  <th>ענק (נתת מתנות ל)</th>
                  <th>ניחוש הגמד שלך</th>
                  <th>הגמד האמיתי</th>
                  <th style="text-align:center">תוצאה</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } catch (err) {
        el.innerHTML = `<div class="error">שגיאה בטעינת הנתונים.<br>האם השרת פועל?</div>`;
      }
    }

    load();
  </script>
</body>
</html>
